<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>Voice Reflection</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 0. Settings Screen -->
  <div id="screen-settings" class="screen">
    <h1>Settings</h1>
    <p class="subtitle">Configure API keys (stored in browser only)</p>
    <form id="settings-form" class="settings-form">
      <div class="settings-group">
        <label for="settings-pin">PIN / Password</label>
        <input type="password" id="settings-pin" class="settings-input" placeholder="Choose a password" autocomplete="off">
      </div>
      <div class="settings-group">
        <label for="settings-gemini-key">Gemini API Key</label>
        <input type="password" id="settings-gemini-key" class="settings-input" placeholder="From aistudio.google.com/apikey">
      </div>
      <div class="settings-group">
        <label for="settings-notion-key">Notion API Key</label>
        <input type="password" id="settings-notion-key" class="settings-input" placeholder="Notion integration token">
      </div>
      <div class="settings-group">
        <label for="settings-worker-url">Cloudflare Worker URL</label>
        <input type="url" id="settings-worker-url" class="settings-input" placeholder="https://notion-proxy.xxx.workers.dev">
      </div>
      <div class="settings-group">
        <label for="settings-notion-db">Notion Database ID</label>
        <input type="text" id="settings-notion-db" class="settings-input" placeholder="Database ID">
      </div>
      <button type="submit" class="btn-primary">Save</button>
    </form>
    <p id="settings-error" class="error hidden">All fields are required.</p>
  </div>

  <!-- 1. PIN Screen -->
  <div id="screen-pin" class="screen active">
    <h1>Voice Reflection</h1>
    <p class="subtitle">Enter password to continue</p>
    <div class="pin-form">
      <input type="password" id="pin-input" class="pin-input" placeholder="Password" autocomplete="off">
      <button id="btn-pin-submit" class="btn-primary">Enter</button>
    </div>
    <p id="pin-error" class="error hidden">Wrong password. Try again.</p>
  </div>

  <!-- 2. Setup Screen -->
  <div id="screen-setup" class="screen">
    <h1>New Session</h1>
    <div class="setup-group">
      <label>Reflection type</label>
      <div class="toggle-group">
        <button id="btn-daily" class="toggle active">Daily</button>
        <button id="btn-weekly" class="toggle">Weekly</button>
      </div>
    </div>
    <div class="setup-group">
      <label for="date-input">Date</label>
      <input type="date" id="date-input" class="date-input">
    </div>
    <button id="btn-start" class="btn-primary">Start Reflection</button>
    <button id="btn-open-settings" class="btn-link settings-link">Settings</button>
  </div>

  <!-- 3. Chat Screen -->
  <div id="screen-chat" class="screen">
    <div id="chat-header" class="chat-header">
      <span id="chat-progress">1 / 6</span>
      <span id="chat-topic">Topic</span>
      <button id="btn-end-session" class="btn-end">End</button>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-area">
      <button id="btn-skip" class="btn-skip">Next &#x203A;</button>
      <div id="mic-container" class="mic-container">
        <button id="btn-mic" class="btn-mic" aria-label="Tap to speak">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <div id="mic-status" class="mic-status">Tap mic to speak</div>
      </div>
      <div id="text-input-container" class="text-input-container">
        <input type="text" id="text-input" class="text-input" placeholder="Type your answer...">
        <button id="btn-send" class="btn-send">Send</button>
      </div>
      <button id="btn-toggle-input" class="btn-link">Type instead</button>
    </div>
  </div>

  <!-- 4. Saving Screen -->
  <div id="screen-saving" class="screen">
    <div class="spinner"></div>
    <p class="saving-text">Saving to Notion...</p>
    <p id="saving-detail" class="saving-detail"></p>
  </div>

  <!-- 5. Done Screen -->
  <div id="screen-done" class="screen">
    <div class="done-icon">&#10003;</div>
    <h1>Saved!</h1>
    <p>Your reflection has been saved to Notion.</p>
    <a id="notion-link" href="#" target="_blank" class="btn-primary">Open in Notion</a>
    <button id="btn-new-session" class="btn-secondary">New Session</button>
  </div>

  <script src="js/questions.js"></script>
  <script src="js/api.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
